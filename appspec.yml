version: 0.0
os: linux
files:
  - source: docker-compose.yml
    destination: /home/ubuntu/nocableapp
  - source: scripts/ecr_env
    destination: /home/ubuntu/nocableapp
hooks:
  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 30
      runas: ubuntu
  AfterInstall:
    - location: scripts/deploy.sh
      timeout: 120
      runas: ubuntu

version: 0.2

env:
  variables:
    IMAGE_REPO_NAME: nocableapp
  parameter-store:
    SMTP_USERNAME: /nocableapp/smtp-username
    SMTP_PASSWORD: /nocableapp/smtp-password

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - ECR_REGISTRY="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)

  build:
    commands:
      - echo Building Docker image...
      - docker build -t $IMAGE_REPO_NAME:$IMAGE_TAG .
      - echo Running Trivy vulnerability scan...
      - |
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          public.ecr.aws/aquasecurity/trivy:latest image \
          --exit-code 1 \
          --ignore-unfixed \
          --severity CRITICAL \
          --vuln-type os,library \
          $IMAGE_REPO_NAME:$IMAGE_TAG

  post_build:
    commands:
      - echo Pushing to ECR...
      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $ECR_REGISTRY/$IMAGE_REPO_NAME:$IMAGE_TAG
      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $ECR_REGISTRY/$IMAGE_REPO_NAME:latest
      - docker push $ECR_REGISTRY/$IMAGE_REPO_NAME:$IMAGE_TAG
      - docker push $ECR_REGISTRY/$IMAGE_REPO_NAME:latest
      - echo "ECR_REGISTRY=$ECR_REGISTRY" > /tmp/ecr_env
      - echo "IMAGE_TAG=$IMAGE_TAG" >> /tmp/ecr_env
      - echo "AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION" >> /tmp/ecr_env
      - echo "SMTP_USERNAME=$SMTP_USERNAME" >> /tmp/ecr_env
      - echo "SMTP_PASSWORD=$SMTP_PASSWORD" >> /tmp/ecr_env
      - cp /tmp/ecr_env scripts/ecr_env

artifacts:
  files:
    - appspec.yml
    - docker-compose.yml
    - scripts/**/*
